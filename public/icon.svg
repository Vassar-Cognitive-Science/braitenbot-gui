<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>
  <!-- Robot body -->
  <rect x="156" y="180" width="200" height="220" rx="20" fill="#16213e" stroke="#e94560" stroke-width="8"/>
  <!-- Left sensor (circle, front-left) -->
  <circle cx="176" cy="160" r="28" fill="#0f3460" stroke="#e94560" stroke-width="6"/>
  <circle cx="176" cy="160" r="14" fill="#e94560" opacity="0.8"/>
  <!-- Right sensor (circle, front-right) -->
  <circle cx="336" cy="160" r="28" fill="#0f3460" stroke="#e94560" stroke-width="6"/>
  <circle cx="336" cy="160" r="14" fill="#e94560" opacity="0.8"/>
  <!-- Left wheel/motor -->
  <rect x="110" y="320" width="50" height="90" rx="10" fill="#0f3460" stroke="#4ecca3" stroke-width="6"/>
  <!-- Right wheel/motor -->
  <rect x="352" y="320" width="50" height="90" rx="10" fill="#0f3460" stroke="#4ecca3" stroke-width="6"/>
  <!-- Connection lines (crossed) -->
  <line x1="176" y1="188" x2="377" y2="320" stroke="#4ecca3" stroke-width="5" stroke-dasharray="10,5" opacity="0.7"/>
  <line x1="336" y1="188" x2="135" y2="320" stroke="#e94560" stroke-width="5" stroke-dasharray="10,5" opacity="0.7"/>
  <!-- Antenna left -->
  <line x1="176" y1="132" x2="156" y2="80" stroke="#e94560" stroke-width="4"/>
  <circle cx="152" cy="74" r="8" fill="#e94560"/>
  <!-- Antenna right -->
  <line x1="336" y1="132" x2="356" y2="80" stroke="#e94560" stroke-width="4"/>
  <circle cx="360" cy="74" r="8" fill="#e94560"/>
</svg>
