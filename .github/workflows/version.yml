name: Version (Changesets)

# Semantic versioning via Changesets.
#
# Workflow:
#   1. Contributors add a changeset to their PR with `npx changeset` (this
#      records the bump type + a changelog entry under .changeset/).
#   2. When changes land on `main`, this workflow opens (or updates) a
#      "Version Packages" PR that consumes the changesets: it bumps the version
#      in package.json and writes CHANGELOG.md. src-tauri/tauri.conf.json picks
#      up the new version automatically via its "version": "../package.json".
#   3. Merging that PR runs this workflow again with no pending changesets, so
#      the `publish` step (scripts/tag-release.mjs) pushes a vX.Y.Z tag, which
#      triggers .github/workflows/release.yml to build and draft the release.
#
# Authentication — uses a GitHub App (not a personal PAT):
#   A tag pushed with the default GITHUB_TOKEN will NOT trigger release.yml
#   (GitHub blocks workflow runs from triggering other workflows), and the
#   default token's PR-creation is gated by org policy. Both problems are solved
#   by minting a short-lived installation token from a GitHub App, which is not
#   tied to any individual's account.
#
#   One-time setup:
#     1. Create a GitHub App (org Settings -> Developer settings -> GitHub Apps).
#        Repository permissions: Contents = Read & write, Pull requests =
#        Read & write. No webhook needed.
#     2. Install the App on this repository.
#     3. Store the App's credentials as repository (or org) secrets:
#          RELEASE_APP_ID          = the App's numeric App ID
#          RELEASE_APP_PRIVATE_KEY = the App's generated .pem private key
#
#   If the secrets are absent the workflow falls back to GITHUB_TOKEN: the
#   Version PR still works (given org policy allows it), but the release tag
#   must be built manually via release.yml's workflow_dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changesets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    # Surface the secret as an env var so the step `if` can gate on it — the
    # `secrets` context is not available in `if` conditions, but `env` is.
    env:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: ${{ env.RELEASE_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Create Version PR or push release tag
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: node scripts/tag-release.mjs
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
