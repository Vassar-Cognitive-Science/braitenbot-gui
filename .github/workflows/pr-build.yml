name: PR build (Tauri desktop)

# Builds the BraitenBot GUI desktop app for macOS (Apple Silicon + Intel),
# Windows, and Linux on pull requests against main, and uploads the resulting
# installers/bundles as GitHub Actions artifacts for reviewers to download.
#
# Notes:
#   - `beforeBuildCommand` in tauri.conf.json runs `npm run fetch:arduino-cli`,
#     which downloads the current platform's arduino-cli sidecar into
#     src-tauri/binaries/ before the Tauri bundler runs. Each matrix job fetches
#     its own platform, so the binary shipped in the bundle is always correct.
#   - Linux needs webkit2gtk + extras to build the Tauri webview; those are
#     installed in the "Install Linux deps" step.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
            artifact-name: macos-aarch64
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
            artifact-name: macos-x86_64
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: ''
            artifact-name: linux-x86_64
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ''
            artifact-name: windows-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.rust-target }}

      - run: npm ci

      # tauri-action runs `beforeBuildCommand` from tauri.conf.json, which
      # in turn invokes `npm run fetch:arduino-cli` to pull the sidecar for
      # this platform before the Tauri bundler runs. With no releaseId set,
      # the action just builds without publishing, leaving installers under
      # `src-tauri/target/**/release/bundle/`.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: braitenbot-gui-${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error
          retention-days: 14
