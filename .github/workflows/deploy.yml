name: Deploy docs to GitHub Pages

# Builds the Docusaurus site in docs/ (the project's main website) and deploys
# it to GitHub Pages.
#
# Before building, scripts/fetch-latest-release.mjs bakes the current release's
# per-platform download links into the Install page. The site is rebuilt on
# every release publish so those links stay current.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/fetch-latest-release.mjs'
      - '.github/workflows/deploy.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Bake latest-release download links into the Install page
        run: node scripts/fetch-latest-release.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
