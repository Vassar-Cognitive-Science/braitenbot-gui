name: CI

# Runs typecheck, lint, and unit tests on every pull request and on pushes
# to main, giving a fast signal before the heavier Tauri desktop builds run.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

  docs-typecheck:
    runs-on: ubuntu-latest

    # The app build now hard-depends on the docs site building (`stage:docs`
    # copies `docs/build` into the app bundle), and the docs' InteractiveDiagram
    # imports the app's simulation core via the `@app` alias — so a type error
    # on either side of that boundary should fail fast here, not surface later
    # as a broken Tauri build.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Typecheck docs
        working-directory: docs
        run: npm run typecheck
